import { useState, useEffect, useCallback, useRef } from "react";

// ═══════════════════════════════════════════════════════════════════
// SECURITY LAYER
// ═══════════════════════════════════════════════════════════════════

// ── AES-GCM encrypt/decrypt using PIN as key ─────────────────────
const Security = {
  // Derive a CryptoKey from PIN using PBKDF2
  async deriveKey(pin, salt) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey("raw", enc.encode(pin), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  },

  // Encrypt a string with PIN → returns base64 bundle
  async encrypt(plaintext, pin) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await this.deriveKey(pin, salt);
    const enc  = new TextEncoder();
    const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(plaintext));
    // Pack: salt(16) + iv(12) + ciphertext
    const bundle = new Uint8Array(16 + 12 + cipher.byteLength);
    bundle.set(salt, 0);
    bundle.set(iv, 16);
    bundle.set(new Uint8Array(cipher), 28);
    return btoa(String.fromCharCode(...bundle));
  },

  // Decrypt base64 bundle with PIN → plaintext or throws
  async decrypt(b64, pin) {
    const bundle = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt   = bundle.slice(0, 16);
    const iv     = bundle.slice(16, 28);
    const cipher = bundle.slice(28);
    const key    = await this.deriveKey(pin, salt);
    const plain  = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
    return new TextDecoder().decode(plain);
  },

  // Hash PIN for lockout verification (not used for encryption)
  async hashPin(pin) {
    const enc  = new TextEncoder();
    const hash = await crypto.subtle.digest("SHA-256", enc.encode(pin + "owallet_salt_v1"));
    return btoa(String.fromCharCode(...new Uint8Array(hash)));
  }
};

// ── Biometric via WebAuthn ────────────────────────────────────────
const Biometric = {
  isSupported() {
    return !!(window.PublicKeyCredential && navigator.credentials);
  },

  async register(userId) {
    if (!this.isSupported()) throw new Error("Not supported");
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: "OWallet", id: window.location.hostname || "localhost" },
        user: { id: new TextEncoder().encode(userId), name: userId, displayName: "OWallet User" },
        pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
        timeout: 60000,
      }
    });
    return btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
  },

  async verify(credIdB64) {
    if (!this.isSupported()) throw new Error("Not supported");
    const challenge  = crypto.getRandomValues(new Uint8Array(32));
    const rawId      = Uint8Array.from(atob(credIdB64), c => c.charCodeAt(0));
    await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{ id: rawId, type: "public-key" }],
        userVerification: "required",
        timeout: 60000,
      }
    });
    return true; // throws if fails
  }
};

// ── Copy to clipboard (mobile-safe fallback) ─────────────────────
const copyToClipboard = (text) => {
  if (navigator.clipboard?.writeText) {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  }
  fallbackCopy(text);
};
const fallbackCopy = (text) => {
  const el = document.createElement("textarea");
  el.value = text;
  el.setAttribute("readonly","");
  el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
  document.body.appendChild(el);
  el.focus(); el.select();
  el.setSelectionRange(0, 99999);
  try { document.execCommand("copy"); } catch {}
  document.body.removeChild(el);
};

const TokenIcon = ({ symbol, color, size=40 }) => {
  if (symbol === "ETH") return (
    <img src={ETH_LOGO} alt="ETH" style={{ width:size, height:size, objectFit:"contain", flexShrink:0 }} onError={e=>e.target.style.display='none'}/>
  );
  if (symbol === "ORFD") return (
    <img src={ORFD_COIN} alt="ORFD" style={{ width:size, height:size, objectFit:"contain", flexShrink:0 }}/>
  );
  return (
    <div style={{ width:size, height:size, borderRadius:size*0.35, background:color+"1A", border:`1px solid ${color}40`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
      <span style={{ fontSize:size*0.27, fontWeight:800, color, fontFamily:"'DM Mono',monospace" }}>{symbol.slice(0,3)}</span>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════
// 6-DIGIT PIN INPUT
// ═══════════════════════════════════════════════════════════════════
function PinInput({ value, onChange, label, disabled }) {
  const refs = Array.from({length:6}, () => useRef(null));
  const pin  = (value||"").slice(0,6);
  const digits = (pin+"      ").slice(0,6).split("");

  useEffect(() => { setTimeout(() => refs[0].current?.focus(), 60); }, []);

  const handleChange = (i, v) => {
    const ch = v.replace(/[^0-9]/g,"").slice(-1);
    const next = digits.map((d,idx) => idx===i ? ch : d.trim());
    onChange(next.join("").replace(/ /g,""));
    if (ch && i < 5) setTimeout(() => refs[i+1].current?.focus(), 10);
  };

  const handleKey = (i, e) => {
    if (e.key === "Backspace") {
      const cur = digits[i].trim();
      if (cur) { const n=digits.map((d,idx)=>idx===i?"":d.trim()); onChange(n.join("")); }
      else if (i > 0) { const n=digits.map((d,idx)=>idx===i-1?"":d.trim()); onChange(n.join("")); setTimeout(()=>refs[i-1].current?.focus(),10); }
    }
  };

  return (
    <div style={{ marginBottom:20 }}>
      {label && <div style={s.label}>{label}</div>}
      <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
        {[0,1,2,3,4,5].map(i => {
          const filled = digits[i]?.trim();
          const isActive = i === pin.length && !disabled;
          return (
            <input key={i} ref={refs[i]}
              type="password" inputMode="numeric" maxLength={1}
              value={filled||""}
              onChange={e => handleChange(i, e.target.value)}
              onKeyDown={e => handleKey(i, e)}
              onFocus={e => e.target.select()}
              disabled={disabled}
              style={{
                width:48, height:58, textAlign:"center", fontSize:24, fontWeight:700,
                background: filled?"rgba(37,99,235,0.2)":"rgba(255,255,255,0.05)",
                border:`1.5px solid ${isActive?"rgba(96,165,250,0.9)":filled?"rgba(96,165,250,0.65)":"rgba(255,255,255,0.1)"}`,
                borderRadius:14, color:"#fff", outline:"none",
                fontFamily:"'Syne',sans-serif", boxSizing:"border-box",
                caretColor:"transparent", transition:"all 0.12s",
                opacity:disabled?0.5:1, userSelect:"none",
                boxShadow: isActive?"0 0 0 3px rgba(96,165,250,0.15)":"none",
              }}
            />
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// LOCK SCREEN
// ═══════════════════════════════════════════════════════════════════
function LockScreen({ wallet, onUnlock }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [lockedUntil, setLockedUntil] = useState(null);
  const [loading, setLoading] = useState(false);
  const [bioLoading, setBioLoading] = useState(false);
  const [timeLeft, setTimeLeft] = useState(0);

  // Countdown timer for lockout
  useEffect(() => {
    if (!lockedUntil) return;
    const t = setInterval(() => {
      const left = Math.ceil((lockedUntil - Date.now()) / 1000);
      if (left <= 0) { setLockedUntil(null); setAttempts(0); setErr(""); clearInterval(t); }
      else setTimeLeft(left);
    }, 1000);
    return () => clearInterval(t);
  }, [lockedUntil]);

  const isLocked = lockedUntil && Date.now() < lockedUntil;

  const handleUnlock = async () => {
    if (isLocked) return;
    if (pin.length < 6) { setErr("Enter your 6-digit PIN"); return; }
    setLoading(true);
    try {
      // Decrypt private key with PIN
      const privateKey = await Security.decrypt(wallet.encryptedKey, pin);
      SESSION.privateKey = privateKey;
      SESSION.unlockTime = Date.now();
      setAttempts(0);
      onUnlock();
    } catch {
      const newAttempts = attempts + 1;
      setAttempts(newAttempts);
      setPin("");
      if (newAttempts >= MAX_ATTEMPTS) {
        setLockedUntil(Date.now() + LOCKOUT_MS);
        setErr(`Too many attempts. Locked for 30 minutes.`);
      } else {
        setErr(`Wrong PIN. ${MAX_ATTEMPTS - newAttempts} attempt${MAX_ATTEMPTS - newAttempts === 1 ? "" : "s"} remaining.`);
      }
    }
    setLoading(false);
  };

  const handleBiometric = async () => {
    if (!wallet.bioCredId) return;
    setBioLoading(true);
    try {
      await Biometric.verify(wallet.bioCredId);
      // Biometric verified — decrypt key using stored PIN hash as proxy
      // In production: store encrypted key copy for biometric unlock
      setErr("Biometric verified! Enter PIN to decrypt key.");
      setBioLoading(false);
      return;
    } catch(e) {
      setErr("Biometric failed. Use PIN.");
    }
    setBioLoading(false);
  };

  // Auto-submit when 6 digits entered
  useEffect(() => { if (pin.length === 6 && !isLocked) handleUnlock(); }, [pin]);

  return (
    <div style={{ position:"fixed", inset:0, background:"#06091A", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", zIndex:500, padding:24 }}>
      <div style={{ position:"absolute", width:280, height:280, background:"radial-gradient(circle,rgba(96,165,250,0.08),transparent 70%)", borderRadius:"50%" }}/>
      <div style={{ filter:"drop-shadow(0 0 24px rgba(96,165,250,.35))", marginBottom:20 }}><img src={ORFD_LOGO} style={{ width:70, height:70, objectFit:"contain" }}/></div>
      <div style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>Welcome Back</div>
      <div style={{ fontSize:12, color:"#4B6A96", marginBottom:32, fontFamily:"'DM Mono',monospace" }}>{shortAddr(wallet?.address)}</div>

      {isLocked ? (
        <div style={{ textAlign:"center" }}>
          <div style={{ width:64, height:64, borderRadius:"50%", background:"rgba(248,113,113,.1)", border:"1px solid rgba(248,113,113,.3)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px" }}>
            <Icon name="lock" size={28} color="#F87171"/>
          </div>
          <div style={{ fontSize:14, color:"#F87171", fontWeight:600 }}>Wallet Locked</div>
          <div style={{ fontSize:28, fontWeight:800, margin:"12px 0", fontFamily:"'DM Mono',monospace", color:"#FBBF24" }}>
            {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,"0")}
          </div>
          <div style={{ fontSize:12, color:"#4B6A96" }}>Too many failed attempts</div>
        </div>
      ) : (
        <>
          <PinInput label="Enter PIN" value={pin} onChange={setPin} disabled={loading}/>
          {err && <ErrBox msg={err}/>}
          <button style={{ ...s.btnPrimary, opacity:loading?0.7:1, marginTop:4 }} onClick={handleUnlock} disabled={loading}>
            {loading ? <Spinner/> : <><Icon name="unlock" size={16} color="#fff"/><span style={{marginLeft:8}}>Unlock</span></>}
          </button>
          {wallet?.bioCredId && Biometric.isSupported() && (
            <button style={{ ...s.btnSecondary, marginTop:8 }} onClick={handleBiometric} disabled={bioLoading}>
              {bioLoading ? <Spinner/> : <><Icon name="fingerprint" size={16} color="#60A5FA"/><span style={{marginLeft:8}}>Use Biometric</span></>}
            </button>
          )}
          {attempts > 0 && (
            <div style={{ fontSize:11, color:"#FBBF24", marginTop:12, textAlign:"center" }}>
              ⚠️ {attempts}/{MAX_ATTEMPTS} failed attempts
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SPLASH
// ═══════════════════════════════════════════════════════════════════
function SplashScreen({ onDone }) {
  const [phase, setPhase] = useState("idle"); // idle → enter → spin → exit
  const doneRef = useRef(onDone);

  useEffect(() => {
    const t1 = setTimeout(() => setPhase("enter"), 80);
    const t2 = setTimeout(() => setPhase("spin"),  700);
    const t3 = setTimeout(() => setPhase("exit"),  9500);
    const t4 = setTimeout(() => doneRef.current?.(), 10000);
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
  }, []);

  const style = {
    idle:  { opacity:0,   transform:"scale(0.3) rotate(0deg)",   transition:"none" },
    enter: { opacity:1,   transform:"scale(1) rotate(0deg)",     transition:"opacity 0.4s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1)" },
    spin:  { opacity:1,   transform:"scale(1.05) rotate(360deg)",transition:"transform 1s cubic-bezier(0.4,0,0.2,1)" },
    exit:  { opacity:0,   transform:"scale(0.5) rotate(370deg)", transition:"opacity 0.3s ease, transform 0.35s ease-in" },
  }[phase];

  return (
    <div style={{ position:"fixed", inset:0, background:"#06091A", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999 }}>
      {/* Glow bg */}
      <div style={{ position:"absolute", width:320, height:320, background:"radial-gradient(circle, rgba(96,165,250,0.15), transparent 70%)", borderRadius:"50%", opacity: phase==="idle"?0:1, transition:"opacity 0.5s" }}/>
      {/* ORFD Logo */}
      <div style={{ ...style, filter:"drop-shadow(0 0 32px rgba(96,165,250,0.6))" }}>
        <img src={ORFD_LOGO} alt="Orfund" style={{ width:120, height:120, objectFit:"contain" }}/>
      </div>
    </div>
  );
}

// SEED CONFIRM
// ═══════════════════════════════════════════════════════════════════
function SeedConfirm({ seed, onConfirmed, onBack }) {
  const words = seed.split(" ");
  const indices = [];
  while (indices.length < 3) {
    const r = Math.floor(Math.abs(Math.sin(indices.length*7.3+seed.length))*12);
    if (!indices.includes(r)) indices.push(r);
  }
  indices.sort((a,b)=>a-b);
  const [answers, setAnswers] = useState(["","",""]);
  const [err, setErr] = useState("");
  const refs = [useRef(),useRef(),useRef()];
  const verify = () => {
    for (let i=0;i<3;i++) { if (answers[i].trim().toLowerCase()!==words[indices[i]]) { setErr(`Word #${indices[i]+1} is incorrect`); return; } }
    onConfirmed();
  };
  return (
    <div style={{ width:"100%", maxWidth:360 }}>
      <div style={{ fontSize:21, fontWeight:800, marginBottom:6 }}>Verify Seed Phrase</div>
      <div style={{ fontSize:12, color:"#4B6A96", marginBottom:28, lineHeight:1.6 }}>Confirm you saved your seed phrase by entering the words below.</div>
      {indices.map((wi,i)=>(
        <div key={i} style={{ marginBottom:16 }}>
          <div style={s.label}>Word #{wi+1}</div>
          <input ref={refs[i]} value={answers[i]}
            onChange={e=>{ const n=[...answers]; n[i]=e.target.value.toLowerCase().replace(/[^a-z]/g,""); setAnswers(n); setErr(""); }}
            onKeyDown={e=>{ if(e.key==="Enter"&&i<2) refs[i+1].current?.focus(); }}
            placeholder={`Word #${wi+1}`} style={s.input} autoComplete="off"/>
        </div>
      ))}
      {err && <ErrBox msg={err}/>}
      <button style={s.btnPrimary} onClick={verify}>Confirm</button>
      <button style={s.btnGhost} onClick={onBack}><Icon name="arrowLeft" size={14} color="#4B6A96"/><span style={{marginLeft:6}}>Back</span></button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════
function SetupScreen({ onSetup }) {
  const [step, setStep] = useState("choice");
  const [generatedSeed, setGeneratedSeed] = useState("");
  const [importWords, setImportWords] = useState(Array(12).fill(""));
  const [revealed, setRevealed] = useState(false);
  const [pin, setPin] = useState(""); const [pinC, setPinC] = useState("");
  const [err, setErr] = useState(""); const [loading, setLoading] = useState(false);
  const [pendingSeed, setPendingSeed] = useState("");
  const [bioEnabled, setBioEnabled] = useState(false);
  const [bioCredId, setBioCredId] = useState(null);

  useEffect(() => {
    if (step==="create_seed" && !generatedSeed) {
      setLoading(true);
      loadEthers().then(e=>{ setGeneratedSeed(e.Wallet.createRandom().mnemonic.phrase); setLoading(false); });
    }
  }, [step]);

  const handleSeedConfirmed = seed => { setPendingSeed(seed); setPin(""); setPinC(""); setErr(""); setStep("set_pin"); };

  const handleSetPin = async () => {
    if (pin.length < 6) { setErr("PIN must be 6 digits"); return; }
    if (pin !== pinC) { setErr("PINs do not match"); return; }
    setLoading(true);
    try {
      const ethers = await loadEthers();
      const wallet = ethers.Wallet.fromMnemonic(pendingSeed);
      // 🔒 Encrypt private key with PIN (AES-256-GCM)
      const encryptedKey = await Security.encrypt(wallet.privateKey, pin);
      const pinHash      = await Security.hashPin(pin);
      // Store decrypted key in session for immediate use
      SESSION.privateKey = wallet.privateKey;
      SESSION.unlockTime = Date.now();
      onSetup({ address: wallet.address, seed: pendingSeed, encryptedKey, pinHash, pin, bioCredId });
    } catch(e) { setErr("Error: " + e.message); }
    setLoading(false);
  };

  const handleImportFinish = async () => {
    if (importWords.some(w=>!w)) { setErr("Fill all 12 words"); return; }
    setLoading(true);
    try {
      const ethers = await loadEthers();
      const mnemonic = importWords.join(" ");
      ethers.utils.HDNode.fromMnemonic(mnemonic);
      setPendingSeed(mnemonic); setPin(""); setPinC(""); setErr(""); setStep("set_pin");
    } catch { setErr("Invalid seed phrase"); }
    setLoading(false);
  };

  const handleEnableBio = async () => {
    try {
      const credId = await Biometric.register(`owallet_${Date.now()}`);
      setBioCredId(credId); setBioEnabled(true);
    } catch(e) { setErr("Biometric setup failed: " + e.message); }
  };

  const reset = () => { setErr(""); setPin(""); setPinC(""); setGeneratedSeed(""); setImportWords(Array(12).fill("")); setRevealed(false); setPendingSeed(""); setBioEnabled(false); setBioCredId(null); setStep("choice"); };

  return (
    <div style={{ minHeight:"100vh", background:"#06091A", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 20px", fontFamily:"'Syne',sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

      {step==="choice" && (
        <div style={{ width:"100%", maxWidth:340, textAlign:"center" }}>
          <div style={{ display:"flex", justifyContent:"center", marginBottom:22, filter:"drop-shadow(0 0 22px rgba(96,165,250,.38))" }}><img src={ORFD_LOGO} style={{ width:70, height:70, objectFit:"contain" }}/></div>
          <div style={{ fontSize:28, fontWeight:800, color:"#fff", marginBottom:6, letterSpacing:"-1px" }}>OWallet</div>
          <div style={{ fontSize:13, color:"#4B6A96", marginBottom:48 }}>Your gateway to Base Network</div>
          <button style={s.btnPrimary} onClick={()=>setStep("create_seed")}>Create New Wallet</button>
          <button style={{ ...s.btnSecondary, marginTop:12 }} onClick={()=>setStep("import_words")}>Import Existing Wallet</button>
        </div>
      )}

      {step==="create_seed" && (
        <div style={{ ...s.card, maxWidth:360, width:"100%" }}>
          <div style={{ fontSize:21, fontWeight:800, marginBottom:6 }}>Your Seed Phrase</div>
          <div style={{ fontSize:12, color:"#4B6A96", marginBottom:20, lineHeight:1.65 }}>Write down all 12 words in order. You'll verify 3 of them next.</div>
          {loading ? <div style={{ display:"flex", justifyContent:"center", padding:"30px 0" }}><Spinner/></div> : (
            <div style={s.seedBox}>
              {revealed ? generatedSeed.split(" ").map((w,i)=><span key={i} style={s.seedChip}><span style={{color:"#60A5FA",fontSize:9}}>{i+1}</span> {w}</span>)
                : <div style={{ color:"#4B6A96", fontSize:13, textAlign:"center", padding:"12px 0", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}><Icon name="shield" size={18} color="#4B6A96"/><span>Tap to reveal</span></div>}
            </div>
          )}
          <button style={s.btnOutline} onClick={()=>setRevealed(!revealed)}>
            <Icon name={revealed?"eyeOff":"eye"} size={14} color="#60A5FA"/><span style={{marginLeft:8}}>{revealed?"Hide":"Show"} Seed Phrase</span>
          </button>
          <button style={{ ...s.btnPrimary, marginTop:14, opacity:(!revealed||loading)?0.5:1 }} disabled={!revealed||loading} onClick={()=>{setErr("");setStep("confirm_seed");}}>I Saved It — Continue</button>
          <button style={s.btnGhost} onClick={reset}><Icon name="arrowLeft" size={14} color="#4B6A96"/><span style={{marginLeft:6}}>Back</span></button>
        </div>
      )}

      {step==="confirm_seed" && (
        <div style={{ ...s.card, maxWidth:360, width:"100%" }}>
          <SeedConfirm seed={generatedSeed} onConfirmed={()=>handleSeedConfirmed(generatedSeed)} onBack={()=>setStep("create_seed")}/>
        </div>
      )}

      {step==="import_words" && (
        <div style={{ ...s.card, maxWidth:380, width:"100%" }}>
          <div style={{ fontSize:21, fontWeight:800, marginBottom:6 }}>Import Wallet</div>
          <div style={{ fontSize:12, color:"#4B6A96", marginBottom:20, lineHeight:1.65 }}>Enter your 12-word recovery phrase.</div>
          <SeedWordGrid words={importWords} onChange={setImportWords}/>
          {err && <ErrBox msg={err}/>}
          <button style={{ ...s.btnPrimary, opacity:loading?0.7:1 }} onClick={handleImportFinish} disabled={loading}>{loading?<Spinner/>:"Continue"}</button>
          <button style={s.btnGhost} onClick={reset}><Icon name="arrowLeft" size={14} color="#4B6A96"/><span style={{marginLeft:6}}>Back</span></button>
        </div>
      )}

      {step==="set_pin" && (
        <div style={{ ...s.card, maxWidth:360, width:"100%" }}>
          <div style={{ fontSize:21, fontWeight:800, marginBottom:6 }}>Set PIN</div>
          <div style={{ fontSize:12, color:"#4B6A96", marginBottom:8, lineHeight:1.65 }}>Your PIN encrypts your private key using AES-256.</div>
          <div style={{ display:"flex", alignItems:"center", gap:8, background:"rgba(52,211,153,.08)", border:"1px solid rgba(52,211,153,.18)", borderRadius:10, padding:"8px 12px", marginBottom:20, fontSize:11, color:"#34D399" }}>
            <Icon name="shield" size={13} color="#34D399"/>
            Private key will be encrypted with AES-256-GCM
          </div>
          <PinInput label="Create PIN (6 digits)" value={pin} onChange={setPin}/>
          <PinInput label="Confirm PIN" value={pinC} onChange={setPinC}/>

          {/* Biometric setup */}
          {Biometric.isSupported() && (
            <div style={{ marginBottom:16 }}>
              {bioEnabled
                ? <div style={{ display:"flex", alignItems:"center", gap:8, background:"rgba(52,211,153,.08)", border:"1px solid rgba(52,211,153,.18)", borderRadius:10, padding:"10px 14px", fontSize:12, color:"#34D399" }}>
                    <Icon name="check" size={14} color="#34D399"/>Biometric enabled
                  </div>
                : <button style={s.btnOutline} onClick={handleEnableBio}>
                    <Icon name="fingerprint" size={14} color="#60A5FA"/><span style={{marginLeft:8}}>Enable Biometric (Optional)</span>
                  </button>}
            </div>
          )}

          {err && <ErrBox msg={err}/>}
          <button style={{ ...s.btnPrimary, opacity:loading?0.7:1 }} onClick={handleSetPin} disabled={loading}>
            {loading ? <Spinner/> : <><Icon name="lock" size={16} color="#fff"/><span style={{marginLeft:8}}>Create Wallet</span></>}
          </button>
          <button style={s.btnGhost} onClick={()=>setStep(generatedSeed?"confirm_seed":"import_words")}><Icon name="arrowLeft" size={14} color="#4B6A96"/><span style={{marginLeft:6}}>Back</span></button>
        </div>
      )}
    </div>
  );
}

function SeedWordGrid({ words, onChange }) {
  const refs = Array.from({length:12},()=>useRef(null));
  const handleChange = (i,v) => {
    const next=[...words];
    if (v.includes(" ")) { const parts=v.trim().split(/\s+/).slice(0,12); parts.forEach((w,j)=>{if(j<12)next[j]=w;}); onChange(next); setTimeout(()=>refs[Math.min(parts.length,11)].current?.focus(),20); return; }
    next[i]=v.toLowerCase().replace(/[^a-z]/g,""); onChange(next);
  };
  const handleKey=(i,e)=>{ if((e.key==="Enter"||e.key===" ")&&i<11){e.preventDefault();refs[i+1].current?.focus();} if(e.key==="Backspace"&&!words[i]&&i>0)refs[i-1].current?.focus(); };
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:22 }}>
      {Array.from({length:12}).map((_,i)=>(
        <div key={i} style={{ position:"relative" }}>
          <span style={{ position:"absolute", top:5, left:7, fontSize:9, color:"#60A5FA", fontWeight:700, pointerEvents:"none" }}>{i+1}</span>
          <input ref={refs[i]} value={words[i]||""} onChange={e=>handleChange(i,e.target.value)} onKeyDown={e=>handleKey(i,e)} placeholder="word"
            style={{ width:"100%", paddingTop:16, paddingBottom:8, paddingLeft:7, paddingRight:5, background:words[i]?"rgba(37,99,235,0.14)":"rgba(255,255,255,0.05)", border:`1px solid ${words[i]?"rgba(96,165,250,0.4)":"rgba(255,255,255,0.09)"}`, borderRadius:10, color:"#fff", fontSize:11, fontFamily:"'DM Mono',monospace", outline:"none", boxSizing:"border-box", transition:"all 0.15s" }}/>
        </div>
      ))}
    </div>
  );
}

// MAIN APP TABS

function PriceChange({ pct, ethBal, price }) {
  const up = pct >= 0;
  const usdChange = ethBal * price * pct / 100;

function SendTab({ wallet, balances, net }) {
  const [to, setTo] = useState("");
  const [amount, setAmount] = useState("");
  const [token, setToken] = useState("ETH");
  const [step, setStep] = useState("form");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const [txHash, setTxHash] = useState("");
  const [gasSpeed, setGasSpeed] = useState("standard"); // slow | standard | fast
  const [gasData, setGasData] = useState(null); // { slow, standard, fast, baseFee, ethPrice }
  const [gasLoading, setGasLoading] = useState(false);
  const [gasLastFetched, setGasLastFetched] = useState(null);
  const gasTimer = useRef(null);
  const selBal = balances.find(b=>b.symbol===token);

  // Fetch real gas from Base Network
  const fetchGas = useCallback(async () => {
    setGasLoading(true);
    try {
      const ethers = await loadEthers();
      const provider = new ethers.providers.JsonRpcProvider(net?.rpc||BASE_RPC);

      // Get fee data (EIP-1559)
      const feeData = await provider.getFeeData();
      const baseFee = feeData.lastBaseFeePerGas || feeData.gasPrice;
      const maxPrio = feeData.maxPriorityFeePerGas || ethers.BigNumber.from("1000000"); // 0.001 gwei default

      // Gas speeds: multiply priority fee
      const GAS_LIMIT = 21000;
      const slow     = baseFee.add(maxPrio.div(2));
      const standard = baseFee.add(maxPrio);
      const fast     = baseFee.add(maxPrio.mul(2));

      const toEth = (bn) => parseFloat(ethers.utils.formatEther(bn.mul(GAS_LIMIT)));

      // Fetch ETH price
      let ethPrice = 3241;
      try {
        const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd");
        const d = await r.json();
        ethPrice = d?.ethereum?.usd || 3241;
      } catch {}

      setGasData({
        slow:     { eth: toEth(slow),     usd: toEth(slow)*ethPrice,     gwei: parseFloat(ethers.utils.formatUnits(slow,"gwei")).toFixed(3) },
        standard: { eth: toEth(standard), usd: toEth(standard)*ethPrice, gwei: parseFloat(ethers.utils.formatUnits(standard,"gwei")).toFixed(3) },
        fast:     { eth: toEth(fast),     usd: toEth(fast)*ethPrice,     gwei: parseFloat(ethers.utils.formatUnits(fast,"gwei")).toFixed(3) },
        baseFeeGwei: parseFloat(ethers.utils.formatUnits(baseFee,"gwei")).toFixed(3),
        ethPrice,
        rawFast: fast,
      });
      setGasLastFetched(new Date());
    } catch(e) {
      setGasData(null);
    }
    setGasLoading(false);
  }, []);

  // Auto-refresh gas every 15 seconds
  useEffect(() => {
    fetchGas();
    gasTimer.current = setInterval(fetchGas, 15000);
    return () => clearInterval(gasTimer.current);
  }, [fetchGas]);

  const selectedGas = gasData?.[gasSpeed];
  const gasDisplay  = selectedGas
    ? `${selectedGas.eth.toFixed(6)} ETH (~$${selectedGas.usd.toFixed(4)})`
    : gasLoading ? "Fetching..." : "Unavailable";
  const gasGwei = selectedGas ? `${selectedGas.gwei} Gwei` : "";

  const validate = () => {
    try { if(!window.ethers?.utils?.isAddress(to)){setErr("Invalid address");return false;} } catch { if(to.length!==42){setErr("Invalid address");return false;} }
    if(!amount||parseFloat(amount)<=0){setErr("Invalid amount");return false;}
    if(selBal&&parseFloat(amount)>parseFloat(selBal.balance)){setErr("Insufficient balance");return false;}
    setErr(""); return true;
  };

  const sendTx = async () => {
    if (!SESSION.privateKey) { setErr("Wallet is locked. Please unlock first."); return; }
    setLoading(true);
    try {
      const ethers = await loadEthers();
      const provider = new ethers.providers.JsonRpcProvider(net?.rpc||BASE_RPC);
      const signer = new ethers.Wallet(SESSION.privateKey, provider);
      const txParams = { to, value: ethers.utils.parseEther(amount), chainId: net?.chainId||BASE_CHAIN_ID };
      // Apply selected gas speed
      if (gasData?.rawFast) {
        const speeds = { slow: gasData.rawFast.div(2), standard: gasData.rawFast, fast: gasData.rawFast.mul(2).div(1) };
        txParams.maxFeePerGas = speeds[gasSpeed] || gasData.rawFast;
        txParams.maxPriorityFeePerGas = ethers.BigNumber.from("1000000");
      }
      const tx = await signer.sendTransaction(txParams);
      setTxHash(tx.hash); setStep("done");
    } catch(e) { setErr(e.reason||e.message||"Transaction failed"); }
    setLoading(false);
  };

  const GasSpeedBtn = ({ id, label, sublabel, color }) => (
    <button onClick={()=>setGasSpeed(id)} style={{
      flex:1, padding:"11px 6px", borderRadius:12, cursor:"pointer",
      border:`1.5px solid ${gasSpeed===id ? color : "rgba(255,255,255,.08)"}`,
      background: gasSpeed===id ? color+"15" : "rgba(255,255,255,.03)",
      fontFamily:"'Syne',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", gap:2
    }}>
      <span style={{ fontWeight:700, fontSize:12, color: gasSpeed===id ? color : "#4B6A96" }}>{label}</span>
      <span style={{ fontSize:9, color: gasSpeed===id ? color+"cc" : "#2A4060", fontWeight:600 }}>{sublabel}</span>
      {gasData && <span style={{ fontSize:9, color: gasSpeed===id ? color : "#36506E", marginTop:1 }}>{gasData[id].gwei}G</span>}
    </button>
  );

  if (step==="done") return (
    <div style={{ ...s.tab, textAlign:"center", paddingTop:60 }}>
      <SuccessCircle/>
      <div style={{ fontSize:22, fontWeight:800 }}>Transaction Sent!</div>
      <div style={{ fontSize:11, color:"#60A5FA", marginTop:12, fontFamily:"'DM Mono',monospace", wordBreak:"break-all", padding:"0 10px" }}>{txHash}</div>
      <button style={{ ...s.btnSecondary, marginTop:20 }} onClick={()=>window.open((net?.explorer||BASESCAN)+txHash,"_blank")}><Icon name="external" size={14} color="#60A5FA"/><span style={{marginLeft:8}}>View on BaseScan</span></button>
      <button style={{ ...s.btnPrimary, marginTop:10 }} onClick={()=>{setStep("form");setTo("");setAmount("");setTxHash("");}}>Send Again</button>
    </div>
  );

  if (step==="confirm") return (
    <div style={s.tab}>
      <div style={{ fontSize:20, fontWeight:800, marginBottom:20 }}>Confirm Transaction</div>
      <div style={s.infoCard}>
        <IR l="Token" v={`${amount} ${token}`}/>
        <IR l="To" v={shortAddr(to)} mono/>
        <IR l="Network" v="Base Mainnet"/>
        <IR l="Gas Speed" v={gasSpeed.charAt(0).toUpperCase()+gasSpeed.slice(1)}/>
        <IR l="Gas Fee" v={selectedGas?`${selectedGas.eth.toFixed(6)} ETH`:"N/A"}/>
        <IR l="Gas (USD)" v={selectedGas?`~$${selectedGas.usd.toFixed(4)}`:"N/A"}/>
        <IR l="Base Fee" v={gasData?`${gasData.baseFeeGwei} Gwei`:"N/A"}/>
        <div style={{ borderTop:"1px solid rgba(255,255,255,.06)", marginTop:12, paddingTop:12 }}>
          <IR l="Total" v={`${amount} ${token} + gas`} bold/>
        </div>
      </div>
      <div style={{ fontSize:11, color:"#F87171", background:"rgba(248,113,113,.07)", border:"1px solid rgba(248,113,113,.14)", borderRadius:10, padding:"10px 14px", marginBottom:16, lineHeight:1.6 }}>⚠️ Real transaction on Base Mainnet. Verify address.</div>
      <button style={{ ...s.btnPrimary, opacity:loading?0.7:1 }} onClick={sendTx} disabled={loading}>{loading?<Spinner/>:"Confirm & Send"}</button>
      <button style={s.btnGhost} onClick={()=>setStep("form")}><Icon name="arrowLeft" size={14} color="#4B6A96"/><span style={{marginLeft:6}}>Edit</span></button>
    </div>
  );

  return (
    <div style={s.tab}>
      <div style={{ fontSize:20, fontWeight:800, marginBottom:20 }}>Send</div>
      <div style={s.label}>Token</div>
      <select style={s.select} value={token} onChange={e=>setToken(e.target.value)}>{balances.map(b=><option key={b.symbol} value={b.symbol}>{b.symbol} — {b.balance}</option>)}</select>
      <div style={s.label}>To Address</div>
      <input style={s.input} placeholder="0x..." value={to} onChange={e=>setTo(e.target.value)}/>
      <div style={s.label}>Amount</div>
      <div style={{ position:"relative" }}>
        <input style={{ ...s.input, paddingRight:58 }} placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)} type="number"/>
        <button style={s.maxTag} onClick={()=>setAmount(selBal?.balance||"0")}>MAX</button>
      </div>

      {/* Gas Speed Selector */}
      <div style={{ marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <span style={s.label}>Gas Speed</span>
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            {gasLastFetched && <span style={{ fontSize:9, color:"#34D399" }}>Live · {gasLastFetched.toLocaleTimeString()}</span>}
            <button onClick={fetchGas} style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}>
              <div style={{ animation:gasLoading?"spin 1s linear infinite":"none" }}><Icon name="refresh" size={12} color="#60A5FA"/></div>
            </button>
          </div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <GasSpeedBtn id="slow"     label="Slow"     sublabel="Low priority"  color="#FBBF24"/>
          <GasSpeedBtn id="standard" label="Standard" sublabel="Recommended"   color="#60A5FA"/>
          <GasSpeedBtn id="fast"     label="Fast"     sublabel="High priority"  color="#34D399"/>
        </div>
      </div>

      {/* Gas Detail Row */}
      <div style={{ ...s.gasRow, flexDirection:"column", alignItems:"flex-start", gap:4 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, width:"100%" }}>
          <Icon name="gas" size={13} color="#4B6A96"/>
          <span style={{ flex:1 }}>Gas Fee: <span style={{color:"#fff", fontWeight:600}}>{gasDisplay}</span></span>
          {gasLoading && <Spinner/>}
        </div>
        {gasData && (
          <div style={{ fontSize:10, color:"#36506E", paddingLeft:21 }}>
            Base Fee: {gasData.baseFeeGwei} Gwei · {gasGwei}
          </div>
        )}
      </div>

      {err&&<ErrBox msg={err}/>}
      <button style={s.btnPrimary} onClick={()=>{if(validate())setStep("confirm");}}>Continue</button>
    </div>
  );
}

// ── Load qrcode library via CDN ───────────────────────────────────
let qrcodeLib = null;
const loadQRCode = () => new Promise(resolve => {
  if (qrcodeLib) { resolve(qrcodeLib); return; }
  if (window.QRCode) { qrcodeLib = window.QRCode; resolve(qrcodeLib); return; }
  const sc = document.createElement("script");
  sc.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
  sc.onload = () => { qrcodeLib = window.QRCode; resolve(qrcodeLib); };
  document.head.appendChild(sc);
});

// ── Real QR Code component ────────────────────────────────────────
function QRCodeDisplay({ value, size = 180 }) {
  const containerRef = useRef(null);
  const [ready, setReady] = useState(false);
  const [error, setError] = useState(false);

  useEffect(() => {
    if (!value) return;
    let cancelled = false;
    setReady(false);
    setError(false);

    loadQRCode().then(QRCode => {
      if (cancelled || !containerRef.current) return;
      // Clear previous QR
      containerRef.current.innerHTML = "";
      try {
        new QRCode(containerRef.current, {
          text: value,
          width: size,
          height: size,
          colorDark: "#0F172A",
          colorLight: "#FFFFFF",
          correctLevel: QRCode.CorrectLevel.M,
        });
        if (!cancelled) setReady(true);
      } catch(e) {
        if (!cancelled) setError(true);
      }
    }).catch(() => { if (!cancelled) setError(true); });

    return () => { cancelled = true; };
  }, [value, size]);

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", marginBottom:22 }}>
      <div style={{
        width: size + 20, height: size + 20,
        background: "#fff", borderRadius: 20,
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "0 0 40px rgba(96,165,250,0.15)",
        position: "relative", overflow: "hidden",
      }}>
        {/* QR container */}
        <div ref={containerRef} style={{ width: size, height: size }} />

        {/* Loading overlay */}
        {!ready && !error && (
          <div style={{ position:"absolute", inset:0, background:"#fff", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <Spinner />
          </div>
        )}

        {/* Error fallback */}
        {error && (
          <div style={{ position:"absolute", inset:0, background:"#fff", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:8 }}>
            <Icon name="alert" size={24} color="#F87171"/>
            <span style={{ fontSize:11, color:"#F87171", textAlign:"center", padding:"0 12px" }}>QR failed to load</span>
          </div>
        )}

        {/* OWallet logo overlay in center */}
        {ready && (
          <div style={{
            position:"absolute",
            width: 36, height: 36,
            background: "#fff",
            borderRadius: 8,
            display: "flex", alignItems: "center", justifyContent: "center",
            top: "50%", left: "50%",
            transform: "translate(-50%, -50%)",
          }}>
            <OWalletLogo size={28} />
          </div>
        )}
      </div>

      {/* Scan hint */}
      {ready && (
        <div style={{ fontSize:11, color:"#4B6A96", marginTop:10, display:"flex", alignItems:"center", gap:6 }}>
          <Icon name="check" size={11} color="#34D399"/>
          Scan to receive on Base Network
        </div>
      )}
    </div>
  );
}

function HistoryTab({ wallet, net }) {
  const TC = { send:"#F87171", receive:"#34D399", contract:"#A78BFA" };
  const SC = { success:"#34D399", pending:"#FBBF24", failed:"#F87171" };
  const [txList, setTxList]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState("");
  const [sel, setSel]         = useState(null);
  const [lastFetched, setLastFetched] = useState(null);
  const addr = wallet?.address || "";

  const fetchTx = useCallback(async () => {
    if (!addr) return;
    setLoading(true); setError("");
    try {
      const ethers = await loadEthers();
      let parsed = [];

      // Try Basescan API first
      try {
        const url = `${net?.apiBase||"https://api.basescan.org/api"}?module=account&action=txlist&address=${addr}&startblock=0&endblock=99999999&page=1&offset=25&sort=desc`;
        const res  = await fetch(url);
        const data = await res.json();
        if (data.status === "1" && Array.isArray(data.result) && data.result.length > 0) {
          parsed = data.result.map(tx => {
            const isOut  = tx.from?.toLowerCase() === addr.toLowerCase();
            const ethVal = parseFloat(ethers.utils.formatEther(tx.value || "0"));
            const gasUsed = parseFloat(ethers.utils.formatEther(
              ethers.BigNumber.from(tx.gasUsed || "0").mul(tx.gasPrice || "0")
            ));
            const status = tx.txreceipt_status === "1" ? "success" : tx.txreceipt_status === "0" ? "failed" : "pending";
            const date   = new Date(parseInt(tx.timeStamp) * 1000);
            return {
              hash: tx.hash, type: tx.input !== "0x" ? "contract" : isOut ? "send" : "receive",
              token: "ETH", amount: ethVal > 0 ? `${isOut?"-":"+"}${ethVal.toFixed(6)} ETH` : "0 ETH",
              ethVal, to: tx.to, from: tx.from, status, isOut,
              date: date.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) + " · " + date.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
              gasUsed: gasUsed.toFixed(8), block: tx.blockNumber, nonce: tx.nonce,
            };
          });
        }
      } catch { /* Basescan CORS blocked → fallback to RPC */ }

      // Fallback: scan via RPC
      if (parsed.length === 0) {
        const provider = new ethers.providers.JsonRpcProvider(net?.rpc||BASE_RPC);
        const latest = await provider.getBlockNumber();
        for (let i = latest; i > latest - 20 && parsed.length < 15; i--) {
          try {
            const block = await provider.getBlockWithTransactions(i);
            if (!block) continue;
            for (const tx of block.transactions) {
              if (tx.from?.toLowerCase() === addr.toLowerCase() || tx.to?.toLowerCase() === addr.toLowerCase()) {
                const isOut  = tx.from?.toLowerCase() === addr.toLowerCase();
                const ethVal = parseFloat(ethers.utils.formatEther(tx.value));
                const rcpt   = await provider.getTransactionReceipt(tx.hash).catch(()=>null);
                const status = rcpt ? (rcpt.status === 1 ? "success" : "failed") : "pending";
                const date   = new Date(block.timestamp * 1000);
                parsed.push({
                  hash: tx.hash, type: tx.data !== "0x" ? "contract" : isOut ? "send" : "receive",
                  token: "ETH", amount: ethVal > 0 ? `${isOut?"-":"+"}${ethVal.toFixed(6)} ETH` : "0 ETH",
                  ethVal, to: tx.to, from: tx.from, status, isOut,
                  date: date.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) + " · " + date.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}),
                  gasUsed: "N/A", block: block.number, nonce: tx.nonce,
                });
              }
            }
          } catch { continue; }
        }
      }

      setTxList(parsed);
      setLastFetched(new Date());
    } catch(e) {
      // Gagal total → jangan tampil error, cukup kosong
      setTxList([]);
      setLastFetched(new Date());
      console.error(e);
    }
    setLoading(false);
  }, [addr]);

  useEffect(() => { fetchTx(); }, [fetchTx, net]);

  if (sel) return (
    <div style={s.tab}>
      <BackBtn onClick={()=>setSel(null)}/>
      <div style={{ fontSize:20, fontWeight:800, marginBottom:20 }}>Transaction Detail</div>
      <div style={s.infoCard}>
        {/* Status badge */}
        <div style={{ display:"flex", justifyContent:"center", marginBottom:16 }}>
          <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:(SC[sel.status]||"#FBBF24")+"18", border:`1px solid ${SC[sel.status]||"#FBBF24"}44`, borderRadius:99, padding:"6px 14px", fontSize:12, color:SC[sel.status]||"#FBBF24", fontWeight:700 }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:SC[sel.status]||"#FBBF24", display:"inline-block" }}/>
            {sel.status.toUpperCase()}
          </div>
        </div>
        <IR l="Type"      v={sel.type?.toUpperCase()}/>
        <IR l="Amount"    v={sel.amount}/>
        <IR l={sel.isOut?"To":"From"} v={shortAddr(sel.isOut?sel.to:sel.from)} mono/>
        <IR l="Date"      v={sel.date}/>
        <IR l="Block"     v={`#${sel.block}`}/>
        <IR l="Nonce"     v={sel.nonce}/>
        <IR l="Gas Used"  v={`${sel.gasUsed} ETH`}/>
        <div style={{ borderTop:"1px solid rgba(255,255,255,.06)", marginTop:10, paddingTop:10 }}>
          <div style={{ fontSize:10, color:"#4B6A96", marginBottom:4, fontWeight:700, letterSpacing:1 }}>TX HASH</div>
          <div style={{ fontSize:10, fontFamily:"'DM Mono',monospace", color:"#60A5FA", wordBreak:"break-all", lineHeight:1.7 }}>{sel.hash}</div>
        </div>
      </div>
      <button style={s.btnSecondary} onClick={()=>window.open((net?.explorer||BASESCAN)+sel.hash,"_blank")}>
        <Icon name="external" size={14} color="#60A5FA"/><span style={{marginLeft:8}}>View on BaseScan</span>
      </button>
    </div>
  );

  return (
    <div style={s.tab}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:800 }}>History</div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {lastFetched && <span style={{ fontSize:9, color:"#34D399" }}>{lastFetched.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}</span>}
          <button onClick={fetchTx} style={{ ...s.iconBtn }} disabled={loading}>
            <div style={{ animation:loading?"spin 1s linear infinite":"none" }}>
              <Icon name="refresh" size={14} color="#60A5FA"/>
            </div>
          </button>
        </div>
      </div>

      {/* Address pill */}
      <div style={{ fontSize:10, color:"#4B6A96", fontFamily:"'DM Mono',monospace", background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.07)", borderRadius:99, padding:"5px 12px", marginBottom:16, display:"inline-block" }}>
        {shortAddr(addr)}
      </div>

      {loading && txList.length === 0 && (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:14, padding:"50px 0", color:"#4B6A96" }}>
          <Spinner/><span style={{fontSize:13}}>Fetching transactions...</span>
        </div>
      )}

      {error && <ErrBox msg={error}/>}

      {!loading && !error && txList.length === 0 && (
        <div style={s.empty}>
          <Icon name="history" size={32} color="#1E3A5F"/><br/>
          No transactions found.<br/>
          <span style={{fontSize:11}}>Transactions will appear here once you send or receive ETH.</span>
        </div>
      )}

      {txList.map((tx, i) => {
        const color = TC[tx.type] || "#60A5FA";
        const sColor = SC[tx.status] || "#FBBF24";
        return (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:14, padding:"13px 0", borderBottom:"1px solid rgba(255,255,255,.04)", cursor:"pointer" }} onClick={()=>setSel(tx)}>
            {/* Icon */}
            <div style={{ width:42, height:42, borderRadius:14, background:color+"18", border:`1px solid ${color}30`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <Icon name={tx.type==="contract"?"tokens":tx.type} size={17} color={color}/>
            </div>
            {/* Info */}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:600, fontSize:13, textTransform:"capitalize" }}>
                {tx.type === "contract" ? "Contract Call" : tx.type === "send" ? "Sent ETH" : "Received ETH"}
              </div>
              <div style={{ fontSize:10, color:"#4B6A96", marginTop:2 }}>{tx.date}</div>
            </div>
            {/* Amount + Status */}
            <div style={{ textAlign:"right", flexShrink:0 }}>
              <div style={{ fontWeight:700, fontSize:13, color: tx.isOut?"#F87171":"#34D399" }}>{tx.amount}</div>
              <div style={{ fontSize:10, color:sColor, marginTop:3, display:"flex", alignItems:"center", justifyContent:"flex-end", gap:3 }}>
                <span style={{ width:5, height:5, borderRadius:"50%", background:sColor, display:"inline-block" }}/>
                {tx.status}
              </div>
            </div>
          </div>
        );
      })}

      {txList.length > 0 && (
        <div style={{ textAlign:"center", padding:"16px 0 4px" }}>
          <button style={{ ...s.btnOutline, width:"auto", padding:"8px 20px" }} onClick={()=>window.open(`https://basescan.org/address/${addr}`,"_blank")}>
            <Icon name="external" size={12} color="#60A5FA"/><span style={{marginLeft:6}}>View All on BaseScan</span>
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  const savedWallet  = (() => { try { const w = localStorage.getItem("owallet_v1"); return w ? JSON.parse(w) : null; } catch { return null; } })();
  const savedNetwork = (() => { try { return localStorage.getItem("owallet_network") || "testnet"; } catch { return "testnet"; } })();
  const [phase, setPhase]     = useState("splash");
  const [tab, setTab]         = useState("home");
  const [wallet, setWallet]   = useState(savedWallet);
  const [network, setNetwork] = useState(savedNetwork); // "testnet" | "mainnet"
  const net = NETWORKS[network] || NETWORKS.testnet;
  const [priceChange, setPriceChange] = useState({ price:3241, change24h:-0.44 });
  const [balances, setBalances] = useState([
    { symbol:"ETH", name:"Ethereum", balance:"0.0000", usd:0, color:"#627EEA" },
    { symbol:"ORFD", name:"Orfund", balance:"0.0000", usd:0, color:"#2563EB" },
  ]);
  const [loadingBal, setLoadingBal] = useState(false);
  const idleTimer = useRef(null);

  // ── Auto-lock on idle ─────────────────────────────────────────
  const resetIdleTimer = useCallback(() => {
    if (phase !== "app") return;
    clearTimeout(idleTimer.current);
    idleTimer.current = setTimeout(() => {
      SESSION.privateKey = null;
      SESSION.unlockTime = null;
      setPhase("locked");
    }, AUTO_LOCK_MS);
  }, [phase]);

  useEffect(() => {
    if (phase !== "app") return;
    const events = ["mousedown","keydown","touchstart","scroll"];
    events.forEach(e => window.addEventListener(e, resetIdleTimer));
    resetIdleTimer();
    return () => { events.forEach(e => window.removeEventListener(e, resetIdleTimer)); clearTimeout(idleTimer.current); };
  }, [phase, resetIdleTimer]);

  const fetchBalances = useCallback(async (addr, activeNet) => {
    if (!addr) return;
    const n = activeNet || net;
    // Multiple fallback RPCs per network
    const rpcList = n.id === "testnet"
      ? ["https://base-sepolia.blockpi.network/v1/rpc/public","https://endpoints.omniatech.io/v1/base/sepolia/public","https://base-sepolia-rpc.publicnode.com"]
      : ["https://base.blockpi.network/v1/rpc/public","https://endpoints.omniatech.io/v1/base/mainnet/public","https://mainnet.base.org"];
    setLoadingBal(true);
    let eth = "0.0000";
    for (const rpc of rpcList) {
      try {
        const ethers = await loadEthers();
        const provider = new ethers.providers.JsonRpcProvider(rpc);
        const raw = await provider.getBalance(addr);
        eth = parseFloat(ethers.utils.formatEther(raw)).toFixed(4);
        break; // success, stop trying
      } catch(e) { console.warn("RPC failed:", rpc, e.message); continue; }
    }
    let ethPrice = 3241; let ethChange24h = 0;
    try {
      const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd&include_24hr_change=true");
      const d = await r.json();
      ethPrice = d?.ethereum?.usd || 3241;
      ethChange24h = d?.ethereum?.usd_24h_change || 0;
    } catch {}
    setPriceChange({ price:ethPrice, change24h:ethChange24h });
    setBalances([
      { symbol:"ETH", name:"Ethereum", balance:eth, usd:parseFloat(eth)*ethPrice, change24h:ethChange24h, color:"#627EEA" },
      { symbol:"ORFD", name:"Orfund", balance:"0.0000", usd:0, change24h:0, color:"#2563EB" },
    ]);
    setLoadingBal(false);
  }, [net]);

  const onSetup = useCallback(async (w) => {
    // Encrypt seed before storing - never store plain text seed
    let safeWallet = { ...w };
    if (w.seed && w.pin) {
      try {
        safeWallet.encryptedSeed = await Security.encrypt(w.seed, w.pin);
      } catch {}
      delete safeWallet.seed;  // remove plain text
      delete safeWallet.pin;   // never store PIN
    }
    try { localStorage.setItem("owallet_v1", JSON.stringify(safeWallet)); } catch {}
    setWallet(safeWallet); setPhase("app");
    await fetchBalances(safeWallet.address, net);
  }, [fetchBalances, net]);

  const onUnlock = useCallback(() => {
    setPhase("app");
    fetchBalances(wallet?.address, net);
  }, [wallet, fetchBalances, net]);

  const switchNetwork = useCallback((netId) => {
    setNetwork(netId);
    try { localStorage.setItem("owallet_network", netId); } catch {}
    fetchBalances(wallet?.address, NETWORKS[netId]);
  }, [wallet, fetchBalances]);

  const onLock = useCallback(() => {
    SESSION.privateKey = null;
    SESSION.unlockTime = null;
    clearTimeout(idleTimer.current);
    setPhase("locked");
  }, []);

  const subTabs  = ["send","receive","swap"];
  const mainTabs = ["home","tokens","history","settings"];
  const tabLabel = { home:"OWallet", tokens:"Tokens", send:"Send", receive:"Receive", swap:"Swap", history:"History", settings:"Settings" };

  const renderContent = () => {
    switch(tab) {
      case "home":     return <HomeTab wallet={wallet} balances={balances} loading={loadingBal} onNavigate={setTab} onRefresh={()=>fetchBalances(wallet?.address, net)} net={net} priceChange={priceChange}/>;
      case "tokens":   return <TokensTab balances={balances} loading={loadingBal} net={net}/>;
      case "swap":     return <SwapTab wallet={wallet} balances={balances} net={net}/>;
      case "send":     return <SendTab wallet={wallet} balances={balances} net={net}/>;
      case "receive":  return <ReceiveTab wallet={wallet} net={net}/>;
      case "swap":     return <SwapTab net={net}/>;
      case "history":  return <HistoryTab wallet={wallet} net={net}/>;
      case "settings": return <SettingsTab wallet={wallet} onLock={onLock} net={net} network={network} onSwitchNetwork={switchNetwork}/>;
      default:         return <HomeTab wallet={wallet} balances={balances} loading={loadingBal} onNavigate={setTab} onRefresh={()=>fetchBalances(wallet?.address, net)} net={net} priceChange={priceChange}/>;
    }
  };

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
      <style>{`*{-webkit-tap-highlight-color:transparent}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}select option{background:#0C1330}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.12);opacity:1}}`}</style>
      <div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", background:"#06091A", color:"#fff", fontFamily:"'Syne',sans-serif", display:"flex", flexDirection:"column", position:"relative", borderLeft:"1px solid rgba(255,255,255,.04)", borderRight:"1px solid rgba(255,255,255,.04)" }}>
        {phase==="splash" && <SplashScreen onDone={()=>setPhase(wallet ? "locked" : "setup")}/>}
        {phase==="setup"  && <SetupScreen onSetup={onSetup}/>}
        {phase==="locked" && <LockScreen wallet={wallet} onUnlock={onUnlock}/>}
        {phase==="app" && (
          <>
            <div style={{ padding:"10px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:"1px solid rgba(255,255,255,.06)", position:"sticky", top:0, background:"rgba(6,9,26,.96)", backdropFilter:"blur(20px)", zIndex:100 }}>
              {subTabs.includes(tab)
                ? <button style={s.iconBtn} onClick={()=>setTab("home")}><Icon name="arrowLeft" size={18} color="#60A5FA"/></button>
                : <div style={{ width:32 }}/>}
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                <div style={{ display:"flex", alignItems:"center", gap:7, fontWeight:700, fontSize:15 }}>
                  {tab==="home"&&<OWalletLogo size={20}/>}{tabLabel[tab]}
                </div>
                {/* Network toggle pill */}
                <div style={{ display:"flex", background:"rgba(255,255,255,.06)", borderRadius:99, padding:2, gap:2 }}>
                  {Object.values(NETWORKS).map(n=>(
                    <button key={n.id} onClick={()=>switchNetwork(n.id)} style={{
                      padding:"3px 10px", borderRadius:99, border:"none", cursor:"pointer",
                      background: network===n.id ? n.color+"22" : "transparent",
                      color: network===n.id ? n.color : "#36506E",
                      fontSize:9, fontWeight:700, fontFamily:"'Syne',sans-serif",
                      border: network===n.id ? `1px solid ${n.color}44` : "1px solid transparent",
                      transition:"all 0.15s",
                    }}>
                      <span style={{ width:5, height:5, borderRadius:"50%", background: network===n.id ? n.color : "#36506E", display:"inline-block", marginRight:4, verticalAlign:"middle" }}/>
                      {n.badge}
                    </button>
                  ))}
                </div>
              </div>
              <button style={s.iconBtn} onClick={onLock} title="Lock wallet"><Icon name="lock" size={16} color="#36506E"/></button>
            </div>
            <div style={{ flex:1, overflowY:"auto", paddingBottom:80 }}>{renderContent()}</div>
            <BottomNav active={["home","tokens","swap","history","settings"].includes(tab)?tab:"home"} onChange={setTab}/>
          </>
        )}
      </div>
    </>
  );
}

const s = {

  btnOutline:  { width:"100%", padding:"11px 14px", background:"rgba(255,255,255,.03)", border:"1px solid rgba(255,255,255,.09)", borderRadius:12, color:"#60A5FA", fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"'Syne',sans-serif", display:"flex", alignItems:"center", justifyContent:"center", marginBottom:12, gap:8 },
  card:        { background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.08)", borderRadius:22, padding:22, width:"100%", boxSizing:"border-box" },
  netBadge:    { display:"inline-flex", alignItems:"center", background:"rgba(52,211,153,.09)", border:"1px solid rgba(52,211,153,.18)", borderRadius:99, padding:"4px 12px", fontSize:11, color:"#34D399", fontWeight:700, marginBottom:16 },

  quickBtn:    { flex:1, background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.07)", borderRadius:16, padding:"14px 8px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", color:"#fff", fontFamily:"'Syne',sans-serif" },
  quickIcon:   { width:42, height:42, borderRadius:13, background:"rgba(96,165,250,.09)", border:"1px solid rgba(96,165,250,.18)", display:"flex", alignItems:"center", justifyContent:"center" },
  sLabel:      { fontSize:10, color:"#36506E", fontWeight:700, letterSpacing:1.8, marginBottom:8, textTransform:"uppercase" },
  iconBtn:     { width:30, height:30, background:"rgba(255,255,255,.05)", border:"none", borderRadius:9, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" },
  infoCard:    { background:"rgba(255,255,255,.04)", borderRadius:16, padding:18, marginBottom:18, border:"1px solid rgba(255,255,255,.07)" },

  maxTag:      { position:"absolute", right:12, top:"50%", transform:"translateY(-60%)", background:"rgba(96,165,250,.1)", border:"1px solid rgba(96,165,250,.22)", borderRadius:7, color:"#60A5FA", fontSize:10, fontWeight:800, padding:"4px 8px", cursor:"pointer", fontFamily:"'Syne',sans-serif" },
  swapBox:     { background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.07)", borderRadius:16, padding:14, marginBottom:4 },

  addrBox:     { background:"rgba(255,255,255,.04)", borderRadius:14, padding:"14px 16px", marginBottom:18, border:"1px solid rgba(255,255,255,.07)" },
  seedBox:     { background:"rgba(29,78,216,.08)", border:"1px solid rgba(29,78,216,.2)", borderRadius:14, padding:14, marginBottom:14, display:"flex", flexWrap:"wrap", gap:7, minHeight:58, alignItems:"center", justifyContent:"center" },
  seedChip:    { background:"rgba(255,255,255,.05)", border:"1px solid rgba(255,255,255,.08)", borderRadius:8, padding:"4px 10px", fontSize:12, fontFamily:"'DM Mono',monospace", color:"#fff" },
  modal:       { position:"fixed", inset:0, background:"rgba(0,0,0,.72)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:9000, padding:24 },
  tagBtn:      { padding:"7px 14px", background:"transparent", border:"1px solid rgba(255,255,255,.14)", borderRadius:10, color:"#fff", fontSize:12, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:600, display:"flex", alignItems:"center", gap:6 },
  empty:       { textAlign:"center", color:"#4B6A96", fontSize:13, padding:"40px 0", lineHeight:2 },
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
    </script>
  </body>
